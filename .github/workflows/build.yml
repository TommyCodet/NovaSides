name: Build NovaSides

on:
  push:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build
        run: mvn clean package

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: NovaSides
          path: target/*.jar
